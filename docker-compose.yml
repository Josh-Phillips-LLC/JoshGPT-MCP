name: JoshGPT

services:
  toolhost:
    build: .
    image: jpg/toolhost:dev
    container_name: jgp-toolhost
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - "${JOSHGPT_MCP_WORKSPACE_HOST_PATH:-.}:/workspace:ro"
      # Required only for run_container_command mode.
      - "${JOSHGPT_MCP_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock"
    ports:
      - "${JOSHGPT_MCP_PUBLISH_HOST:-127.0.0.1}:${JOSHGPT_MCP_PUBLISH_PORT:-8787}:${JOSHGPT_MCP_BIND_PORT:-8787}"

  dispatcher:
    build: .
    image: jpg/dispatcher:dev
    container_name: jgp-dispatcher
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "src/dispatcher_mcp_server.py"]
    volumes:
      - "${JOSHGPT_DISPATCHER_DB_VOLUME:-joshgpt-dispatcher-data}:/data"
    environment:
      - JOSHGPT_DISPATCHER_BIND_HOST=${JOSHGPT_DISPATCHER_BIND_HOST:-0.0.0.0}
      - JOSHGPT_DISPATCHER_BIND_PORT=${JOSHGPT_DISPATCHER_BIND_PORT:-8788}
      - JOSHGPT_DISPATCHER_TRANSPORT=${JOSHGPT_DISPATCHER_TRANSPORT:-streamable-http}
      - JOSHGPT_DISPATCHER_DB_PATH=${JOSHGPT_DISPATCHER_DB_PATH:-/data/dispatcher.db}
      - JOSHGPT_DISPATCHER_REQUIRE_SHARED_TOKEN=${JOSHGPT_DISPATCHER_REQUIRE_SHARED_TOKEN:-true}
      - JOSHGPT_DISPATCHER_SHARED_TOKEN=${JOSHGPT_DISPATCHER_SHARED_TOKEN:-replace-me-dispatcher-token}
    ports:
      - "${JOSHGPT_DISPATCHER_PUBLISH_HOST:-127.0.0.1}:${JOSHGPT_DISPATCHER_PUBLISH_PORT:-8788}:${JOSHGPT_DISPATCHER_BIND_PORT:-8788}"

  supervisor:
    build: .
    image: jpg/supervisor:dev
    container_name: jgp-supervisor
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "src/supervisor_capability_server.py"]
    environment:
      - JOSHGPT_SUPERVISOR_BIND_HOST=${JOSHGPT_SUPERVISOR_BIND_HOST:-0.0.0.0}
      - JOSHGPT_SUPERVISOR_BIND_PORT=${JOSHGPT_SUPERVISOR_BIND_PORT:-8789}
      - JOSHGPT_SUPERVISOR_TRANSPORT=${JOSHGPT_SUPERVISOR_TRANSPORT:-streamable-http}
      - JOSHGPT_SUPERVISOR_REQUIRE_SHARED_TOKEN=${JOSHGPT_SUPERVISOR_REQUIRE_SHARED_TOKEN:-true}
      - JOSHGPT_SUPERVISOR_SHARED_TOKEN=${JOSHGPT_SUPERVISOR_SHARED_TOKEN:-replace-me-supervisor-token}
      - JOSHGPT_SUPERVISOR_DEFAULT_ESCALATE_ROLE=${JOSHGPT_SUPERVISOR_DEFAULT_ESCALATE_ROLE:-executive-sponsor}
    ports:
      - "${JOSHGPT_SUPERVISOR_PUBLISH_HOST:-127.0.0.1}:${JOSHGPT_SUPERVISOR_PUBLISH_PORT:-8789}:${JOSHGPT_SUPERVISOR_BIND_PORT:-8789}"

volumes:
  joshgpt-dispatcher-data:
